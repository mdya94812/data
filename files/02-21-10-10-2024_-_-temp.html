<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Your Uploads</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            color: #333;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #2c3e50;
            font-weight: 600;
        }

        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #deleteBtn {
            background-color: white;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }

        #deleteBtn:hover {
            background-color: #e74c3c;
            color: white;
        }

        #verifyBtn {
            background-color: #3498db;
            color: white;
            border: none;
            margin-left: 0.5rem;
        }

        #verifyBtn:hover {
            background-color: #2980b9;
        }

        #passwordField {
            display: none;
            margin-top: 1rem;
            animation: fadeIn 0.5s ease;
        }

        input[type="password"] {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            padding: 0.75rem;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            width: 60%;
        }

        #wrongPassword {
            color: #e74c3c;
            margin-top: 1rem;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Manage Your Uploads</h1>
        <button id="deleteBtn">Delete Your Uploads</button>
        <div id="passwordField">
            <input type="password" id="password" placeholder="Enter password">
            <button id="verifyBtn">Verify</button>
            <div id="wrongPassword">Wrong password. Please try again.</div>
        </div>
    </div>

    <script>
        const deleteBtn = document.getElementById('deleteBtn');
        const passwordField = document.getElementById('passwordField');
        const passwordInput = document.getElementById('password');
        const verifyBtn = document.getElementById('verifyBtn');
        const wrongPassword = document.getElementById('wrongPassword');

        const password = 'correctpassword'; // The password to match

        function xyz() {
            console.log('xyz function executed. Implement your logic here.');
            // Add your custom logic here
            alert('Uploads deleted successfully!');
        }

        deleteBtn.addEventListener('click', () => {
            passwordField.style.display = 'block';
            deleteBtn.style.display = 'none';
        });

        verifyBtn.addEventListener('click', () => {
            const enteredPassword = passwordInput.value;
            if (enteredPassword === password) {
                xyz(); // Execute xyz function when password matches
                deleteBtn.style.display = 'none'; // Hide the "Delete Your Uploads" button
                passwordField.style.display = 'none'; // Hide the password field and verify button
                wrongPassword.style.display = 'none'; // Hide the wrong password message
            } else {
                wrongPassword.style.display = 'block'; // Show the wrong password message
                wrongPassword.style.animation = 'none';
                void wrongPassword.offsetWidth; // Trigger reflow
                wrongPassword.style.animation = null;
            }
            passwordInput.value = ''; // Clear the password field
        });
    </script>
</body>
</html>
